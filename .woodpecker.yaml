when:
  - event: [push, pull_request]

steps:
  # ── CI: tests (all branches, push + PR) ──

  - name: backend-test
    image: python:3.12-slim
    commands:
      - cd backend
      - pip install -e ".[dev]"
      - pytest

  - name: worker-typecheck
    image: node:22-slim
    commands:
      - cd worker
      - npm install
      - npm run type-check

  # ── Deploy: Docker images (push to main only) ──

  - name: build-coordinator
    image: gcr.io/kaniko-project/executor:debug
    when:
      - event: push
        branch: main
    commands:
      - >
        /kaniko/executor
        --dockerfile=backend/Dockerfile.coordinator
        --context=backend
        --build-arg=YTDLP_CHANNEL=nightly
        --destination=172.20.0.161:30500/cassandra-yt-mcp/coordinator:latest
        --destination=172.20.0.161:30500/cassandra-yt-mcp/coordinator:${CI_COMMIT_SHA:0:7}
        --insecure
        --cache=false

  - name: build-worker
    image: gcr.io/kaniko-project/executor:debug
    when:
      - event: push
        branch: main
    environment:
      HUGGINGFACE_TOKEN:
        from_secret: huggingface_token
    commands:
      - >
        /kaniko/executor
        --dockerfile=backend/Dockerfile
        --context=backend
        --build-arg=YTDLP_CHANNEL=nightly
        --build-arg=HUGGINGFACE_TOKEN=$HUGGINGFACE_TOKEN
        --destination=172.20.0.161:30500/cassandra-yt-mcp/backend:latest
        --destination=172.20.0.161:30500/cassandra-yt-mcp/backend:${CI_COMMIT_SHA:0:7}
        --insecure
        --cache=false

  # ── Deploy: CF Worker (push to main, only when worker/ changed) ──

  - name: deploy-cf-worker
    image: node:22-slim
    when:
      - event: push
        branch: main
        path:
          include: ['worker/**']
    environment:
      CLOUDFLARE_API_TOKEN:
        from_secret: cloudflare_api_token
      CLOUDFLARE_ACCOUNT_ID:
        from_secret: cloudflare_account_id
      OAUTH_KV_ID:
        from_secret: yt_mcp_oauth_kv_id
      MCP_KEYS_KV_ID:
        from_secret: mcp_keys_kv_id
      WORKER_ROUTE_PATTERN:
        from_secret: yt_mcp_worker_route_pattern
      WORKER_ROUTE_ZONE:
        from_secret: yt_mcp_worker_route_zone
    commands:
      - cd worker
      - npm install
      - |
        node -e "
        const fs = require('fs');
        const config = {
          '\$schema': 'node_modules/wrangler/config-schema.json',
          name: 'cassandra-yt-mcp',
          main: 'src/index.ts',
          compatibility_date: '2025-03-10',
          compatibility_flags: ['nodejs_compat'],
          migrations: [
            { new_sqlite_classes: ['CassandraYtMCP'], tag: 'v1' }
          ],
          durable_objects: {
            bindings: [
              { class_name: 'CassandraYtMCP', name: 'MCP_OBJECT' }
            ]
          },
          kv_namespaces: [
            { binding: 'OAUTH_KV', id: process.env.OAUTH_KV_ID },
            { binding: 'MCP_KEYS', id: process.env.MCP_KEYS_KV_ID }
          ],
          routes: [
            { pattern: process.env.WORKER_ROUTE_PATTERN, zone_name: process.env.WORKER_ROUTE_ZONE }
          ],
          observability: { enabled: true }
        };
        fs.writeFileSync('wrangler.jsonc', JSON.stringify(config, null, 2));
        "
      - npx wrangler deploy
