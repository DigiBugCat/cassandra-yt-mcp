when:
  - event: [push, pull_request, cron]

steps:
  # ── CI: tests (all branches, push + PR) ──

  - name: backend-test
    image: python:3.12-slim
    when:
      - event: [push, pull_request]
        path:
          include: ['backend/**']
    commands:
      - cd backend
      - pip install -e ".[dev]"
      - pytest

  - name: worker-typecheck
    image: node:22-slim
    when:
      - event: [push, pull_request]
        path:
          include: ['worker/**']
    commands:
      - cd worker
      - npm install
      - npm run type-check

  # ── Deploy: Docker images via BuildKit (push to main only) ──

  - name: build-coordinator
    image: moby/buildkit:v0.21.1
    when:
      - event: push
        branch: main
        path:
          include: ['backend/Dockerfile.coordinator', 'backend/pyproject.toml', 'backend/src/**']
    commands:
      - >
        buildctl
        --addr tcp://buildkitd.buildkitd.svc.cluster.local:1234
        build
        --frontend dockerfile.v0
        --local context=backend
        --local dockerfile=backend
        --opt filename=Dockerfile.coordinator
        --opt build-arg:YTDLP_CHANNEL=stable
        --output type=image,name=172.20.0.161:30500/cassandra-yt-mcp/coordinator:latest,push=true,registry.insecure=true

  # ── Cron: rebuild coordinator with latest yt-dlp stable (no cache) ──

  - name: rebuild-coordinator-ytdlp
    image: moby/buildkit:v0.21.1
    when:
      - event: cron
        cron: ytdlp-update
    commands:
      - >
        buildctl
        --addr tcp://buildkitd.buildkitd.svc.cluster.local:1234
        build
        --frontend dockerfile.v0
        --local context=backend
        --local dockerfile=backend
        --opt filename=Dockerfile.coordinator
        --opt build-arg:YTDLP_CHANNEL=stable
        --opt no-cache=
        --output type=image,name=172.20.0.161:30500/cassandra-yt-mcp/coordinator:latest,push=true,registry.insecure=true

  - name: build-worker-onnx
    image: moby/buildkit:v0.21.1
    when:
      - event: push
        branch: main
        path:
          include: ['backend/Dockerfile.onnx', 'backend/pyproject.toml', 'backend/src/**']
    environment:
      HF_TOKEN:
        from_secret: hf_token
    commands:
      - >
        buildctl
        --addr tcp://buildkitd.buildkitd.svc.cluster.local:1234
        build
        --frontend dockerfile.v0
        --local context=backend
        --local dockerfile=backend
        --opt filename=Dockerfile.onnx
        --opt build-arg:HF_TOKEN=$HF_TOKEN
        --output type=image,name=172.20.0.161:30500/cassandra-yt-mcp/backend-onnx:latest,push=true,registry.insecure=true

  - name: build-worker-nemo
    image: moby/buildkit:v0.21.1
    when:
      - event: push
        branch: main
        path:
          include: ['backend/Dockerfile', 'backend/pyproject.toml', 'backend/src/**']
    environment:
      HF_TOKEN:
        from_secret: hf_token
    commands:
      - >
        buildctl
        --addr tcp://buildkitd.buildkitd.svc.cluster.local:1234
        build
        --frontend dockerfile.v0
        --local context=backend
        --local dockerfile=backend
        --opt filename=Dockerfile
        --opt build-arg:HUGGINGFACE_TOKEN=$HF_TOKEN
        --output type=image,name=172.20.0.161:30500/cassandra-yt-mcp/backend:latest,push=true,registry.insecure=true

  # ── Deploy: CF Worker (push to main, only when worker/ changed) ──

  - name: deploy-cf-worker
    image: node:22-slim
    when:
      - event: push
        branch: main
        path:
          include: ['worker/**']
    environment:
      CLOUDFLARE_API_TOKEN:
        from_secret: cloudflare_api_token
      CLOUDFLARE_ACCOUNT_ID:
        from_secret: cloudflare_account_id
      OAUTH_KV_ID:
        from_secret: yt_mcp_oauth_kv_id
      MCP_KEYS_KV_ID:
        from_secret: mcp_keys_kv_id
      WORKER_ROUTE_PATTERN:
        from_secret: yt_mcp_worker_route_pattern
      WORKER_ROUTE_ZONE:
        from_secret: yt_mcp_worker_route_zone
    commands:
      - cd worker
      - npm install
      - |
        node -e "
        const fs = require('fs');
        const config = {
          '\$schema': 'node_modules/wrangler/config-schema.json',
          name: 'cassandra-yt-mcp',
          main: 'src/index.ts',
          compatibility_date: '2025-03-10',
          compatibility_flags: ['nodejs_compat'],
          migrations: [
            { new_sqlite_classes: ['CassandraYtMCP'], tag: 'v1' }
          ],
          durable_objects: {
            bindings: [
              { class_name: 'CassandraYtMCP', name: 'MCP_OBJECT' }
            ]
          },
          kv_namespaces: [
            { binding: 'OAUTH_KV', id: process.env.OAUTH_KV_ID },
            { binding: 'MCP_KEYS', id: process.env.MCP_KEYS_KV_ID }
          ],
          routes: [
            { pattern: process.env.WORKER_ROUTE_PATTERN, zone_name: process.env.WORKER_ROUTE_ZONE }
          ],
          observability: { enabled: true }
        };
        fs.writeFileSync('wrangler.jsonc', JSON.stringify(config, null, 2));
        "
      - npx wrangler deploy
