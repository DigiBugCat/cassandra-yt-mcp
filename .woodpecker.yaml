when:
  - event: [push, pull_request, cron]

steps:
  # ── CI: tests (all branches, push + PR) ──

  - name: backend-test
    image: python:3.12-slim
    when:
      - event: [push, pull_request]
    commands:
      - apt-get update && apt-get install -y --no-install-recommends git ca-certificates && rm -rf /var/lib/apt/lists/*
      - cd backend
      - pip install -e ".[dev]"
      - pytest

  - name: worker-typecheck
    image: node:22-slim
    when:
      - event: [push, pull_request]
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - apt-get update && apt-get install -y --no-install-recommends git ca-certificates && rm -rf /var/lib/apt/lists/*
      - printf "machine github.com\nlogin x-access-token\npassword $GITHUB_TOKEN\n" > /root/.netrc && chmod 600 /root/.netrc
      - git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
      - git config --global url."https://github.com/".insteadOf "git@github.com:"
      - git config --global url."https://github.com/".insteadOf "git+ssh://git@github.com/"
      - cd worker
      - npm install
      - npm run type-check

  # ── Deploy: Docker images via BuildKit (push to main only) ──
  # Builds always run — BuildKit layer cache makes no-op rebuilds fast.

  - name: build-coordinator
    image: moby/buildkit:v0.21.1
    when:
      - event: push
        branch: main
    environment:
      AUTH_YAML_CONTENT:
        from_secret: auth_yaml
    commands:
      - >
        buildctl
        --addr tcp://buildkitd.buildkitd.svc.cluster.local:1234
        build
        --frontend dockerfile.v0
        --local context=backend
        --local dockerfile=backend
        --opt filename=Dockerfile.coordinator
        --opt build-arg:YTDLP_CHANNEL=stable
        --opt "build-arg:AUTH_YAML_CONTENT=$AUTH_YAML_CONTENT"
        --output type=image,name=172.20.0.161:30500/cassandra-yt-mcp/coordinator:latest,push=true,registry.insecure=true

  - name: restart-coordinator
    image: bitnami/kubectl:latest
    when:
      - event: push
        branch: main
    commands:
      - kubectl rollout restart deployment cassandra-yt-mcp -n cassandra-yt-mcp

  # ── Cron: rebuild coordinator with latest yt-dlp stable (no cache) ──

  - name: rebuild-coordinator-ytdlp
    image: moby/buildkit:v0.21.1
    when:
      - event: cron
        cron: ytdlp-update
    environment:
      AUTH_YAML_CONTENT:
        from_secret: auth_yaml
    commands:
      - >
        buildctl
        --addr tcp://buildkitd.buildkitd.svc.cluster.local:1234
        build
        --frontend dockerfile.v0
        --local context=backend
        --local dockerfile=backend
        --opt filename=Dockerfile.coordinator
        --opt build-arg:YTDLP_CHANNEL=stable
        --opt "build-arg:AUTH_YAML_CONTENT=$AUTH_YAML_CONTENT"
        --opt no-cache=
        --output type=image,name=172.20.0.161:30500/cassandra-yt-mcp/coordinator:latest,push=true,registry.insecure=true

  - name: build-worker-rust
    image: moby/buildkit:v0.21.1
    when:
      - event: push
        branch: main
    commands:
      - >
        buildctl
        --addr tcp://buildkitd.buildkitd.svc.cluster.local:1234
        build
        --frontend dockerfile.v0
        --local context=gpu-worker
        --local dockerfile=gpu-worker
        --output type=image,name=172.20.0.161:30500/cassandra-yt-mcp/gpu-worker:latest,push=true,registry.insecure=true

  - name: restart-worker
    image: bitnami/kubectl:latest
    when:
      - event: push
        branch: main
    commands:
      - kubectl rollout restart deployment cassandra-yt-mcp-worker -n cassandra-yt-mcp

  # ── Deploy: CF Worker (push to main, only when worker/ changed) ──

  - name: deploy-cf-worker
    image: node:22-slim
    when:
      - event: push
        branch: main
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
      CLOUDFLARE_API_TOKEN:
        from_secret: cloudflare_api_token
      CLOUDFLARE_ACCOUNT_ID:
        from_secret: cloudflare_account_id
      OAUTH_KV_ID:
        from_secret: yt_mcp_oauth_kv_id
      MCP_KEYS_KV_ID:
        from_secret: mcp_keys_kv_id
      WORKER_ROUTE_PATTERN:
        from_secret: yt_mcp_worker_route_pattern
      WORKER_ROUTE_ZONE:
        from_secret: yt_mcp_worker_route_zone
    commands:
      - apt-get update && apt-get install -y --no-install-recommends git ca-certificates && rm -rf /var/lib/apt/lists/*
      - printf "machine github.com\nlogin x-access-token\npassword $GITHUB_TOKEN\n" > /root/.netrc && chmod 600 /root/.netrc
      - git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
      - git config --global url."https://github.com/".insteadOf "git@github.com:"
      - git config --global url."https://github.com/".insteadOf "git+ssh://git@github.com/"
      - cd worker
      - npm install
      - |
        node -e "
        const fs = require('fs');
        const config = {
          '\$schema': 'node_modules/wrangler/config-schema.json',
          name: 'cassandra-yt-mcp',
          main: 'src/index.ts',
          compatibility_date: '2025-03-10',
          compatibility_flags: ['nodejs_compat'],
          migrations: [
            { new_sqlite_classes: ['CassandraYtMCP'], tag: 'v1' }
          ],
          durable_objects: {
            bindings: [
              { class_name: 'CassandraYtMCP', name: 'MCP_OBJECT' }
            ]
          },
          kv_namespaces: [
            { binding: 'OAUTH_KV', id: process.env.OAUTH_KV_ID },
            { binding: 'MCP_KEYS', id: process.env.MCP_KEYS_KV_ID }
          ],
          routes: [
            { pattern: process.env.WORKER_ROUTE_PATTERN, zone_name: process.env.WORKER_ROUTE_ZONE }
          ],
          triggers: { crons: ['0 */4 * * *'] },
          observability: { enabled: true }
        };
        fs.writeFileSync('wrangler.jsonc', JSON.stringify(config, null, 2));
        "
      - npx wrangler deploy
